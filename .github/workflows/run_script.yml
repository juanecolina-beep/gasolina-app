name: Actualizar precios gasolina + energía

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CLONAR REPO
      # =========================
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # =========================
      # 2. PYTHON
      # =========================
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # =========================
      # 3. DEPENDENCIAS
      # =========================
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pandas requests

      # =========================
      # 4. EJECUCIÓN MAIN (FAIL FAST)
      # =========================
      - name: Ejecutar main.py
        run: |
          set -e
          echo "🚀 Ejecutando script..."
          python main.py

      # =========================
      # 5. VALIDACIÓN REAL DE OUTPUT
      # =========================
      - name: Validar outputs críticos
        run: |
          echo "📂 Validando archivos generados..."

          # JS obligatorio
          if [ ! -s js/script.js ]; then
            echo "❌ script.js vacío o no existe"
            exit 1
          fi

          # Validación mínima de contenido JS (anti basura)
          if ! grep -q "setText" js/script.js && ! grep -q "document.getElementById" js/script.js; then
            echo "❌ script.js inválido (sin lógica)"
            exit 1
          fi

          echo "✅ JS válido"

          # imágenes opcionales
          [ -f historial_gasolina.png ] || echo "⚠️ Falta historial gasolina"
          [ -f historial_energia.png ] || echo "⚠️ Falta historial energía"

      # =========================
      # 6. TIMESTAMP
      # =========================
      - name: Forzar actualización
        run: |
          mkdir -p docs
          date > docs/last_update.txt

      # =========================
      # 7. COMMIT INTELIGENTE REAL
      # =========================
      - name: Commit y push cambios
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "📂 Estado del repo:"
          git status

          # SOLO LO IMPORTANTE
          git add js/script.js docs/ historial_*.png gasolina.db main.py || true

          # evitar commits basura
          if git diff --cached --quiet; then
            echo "⚠️ Sin cambios reales"
            exit 0
          fi

          git commit -m "🚀 Update gasolina + energía $(date '+%Y-%m-%d %H:%M')"
          git push

      # =========================
      # 8. DIAGNÓSTICO FINAL
      # =========================
      - name: Estado final
        run: |
          echo "=================================="
          echo "✅ WORKFLOW OK"
          echo "=================================="
          git log -1 --oneline || true