name: Actualizar precios gasolina

on:
  schedule:
    - cron: "0 8 * * *"  # Ejecutar cada día a las 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Clonar repositorio
        uses: actions/checkout@v3

      # 2. Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Ejecutar script principal
      - name: Ejecutar main.py
        run: python main.py

      # 5. Commit y push automáticos si hay cambios
      - name: Commit y push cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Actualizar datos gasolina"
          git push