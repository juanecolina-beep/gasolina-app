name: Actualizar precios gasolina + energía

on:
  schedule:
    - cron: "0 * * * *"  # cada hora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Clonar repositorio
        uses: actions/checkout@v3

      # 2. Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pandas requests

      # 4. Ejecutar script
      - name: Ejecutar main.py
        run: python main.py

      # 5. Commit y push (CON PERSISTENCIA REAL)
      - name: Commit y push cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 🔥 AÑADIR TODO (incluye DB, imágenes, js, csv)
          git add docs/ gasolina.db || true

          echo "📂 Archivos modificados:"
          git status

          # Evitar fallo si no hay cambios
          if git diff --cached --quiet; then
            echo "⚠️ No hay cambios para commit"
          else
            git commit -m "🚀 Update gasolina + energía ($(date '+%Y-%m-%d %H:%M'))"
            git push
          fi

      # 6. KEEP-ALIVE (evita que GitHub duerma el cron)
      - name: Keep alive
        run: |
          echo "⏰ Manteniendo workflow activo"