name: Actualizar precios gasolina + energía

on:
  schedule:
    - cron: "0 * * * *"  # cada hora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Clonar repositorio
        uses: actions/checkout@v3

      # 2. Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pandas requests

      # 4. Ejecutar script (con control de errores)
      - name: Ejecutar main.py
        run: |
          echo "🚀 Ejecutando script..."
          python main.py

      # 5. Forzar cambio SIEMPRE (anti-GitHub dormido)
      - name: Forzar actualización
        run: |
          date > docs/last_update.txt

      # 6. Commit y push (persistencia real + debug)
      - name: Commit y push cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 🔥 Añadir TODO lo importante
          git add docs/ gasolina.db || true

          echo "📂 Archivos modificados:"
          git status

          # Detectar cambios reales
          if git diff --cached --quiet; then
            echo "⚠️ No hay cambios detectados, pero forzamos commit"
            git commit --allow-empty -m "🔄 Keep alive ($(date '+%Y-%m-%d %H:%M'))"
          else
            git commit -m "🚀 Update gasolina + energía ($(date '+%Y-%m-%d %H:%M'))"
          fi

          git push

      # 7. Log final (para saber si todo fue bien)
      - name: Estado final
        run: |
          echo "✅ Workflow completado correctamente"