name: Actualizar precios gasolina

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar main.py
        run: python main.py

      - name: Commit cambios automáticos
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # Solo agregar los archivos dentro de docs/ que GitHub Pages usa
          git add docs/precios_gasolina.csv docs/historial_gasolina.png docs/js/script.js
          git diff --cached --quiet || git commit -m "Actualizar datos gasolina"
          git push