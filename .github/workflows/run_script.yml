name: Actualizar precios gasolina + energía

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CLONAR REPO
      # =========================
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # =========================
      # 2. PYTHON
      # =========================
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # =========================
      # 3. DEPENDENCIAS
      # =========================
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pandas requests

      # =========================
      # 4. EJECUTAR MAIN (CONTROL TOTAL)
      # =========================
      - name: Ejecutar main.py
        run: |
          echo "🚀 Ejecutando script..."
          python main.py 2>&1 | tee output.log

      # =========================
      # 5. DEBUG LOG (CLAVE)
      # =========================
      - name: Mostrar logs
        run: |
          echo "📄 OUTPUT DEL SCRIPT:"
          cat output.log || true

      # =========================
      # 6. VALIDACIÓN REAL (ANTI HUMO)
      # =========================
      - name: Validar outputs críticos
        run: |
          echo "📂 Validando archivos..."

          # JS obligatorio
          if [ ! -s js/script.js ]; then
            echo "❌ script.js vacío o no existe"
            exit 1
          fi

          # Validar contenido real JS
          if ! grep -q "setText" js/script.js && ! grep -q "document.getElementById" js/script.js; then
            echo "❌ script.js inválido"
            exit 1
          fi

          echo "✅ JS OK"

          # CSV opcional pero recomendable
          if ls docs/*.csv 1> /dev/null 2>&1; then
            echo "✅ CSV generado"
          else
            echo "⚠️ No hay CSV"
          fi

          # Imágenes (no críticas)
          [ -f historial_gasolina.png ] || echo "⚠️ Falta historial gasolina"
          [ -f historial_energia.png ] || echo "⚠️ Falta historial energía"

      # =========================
      # 7. TIMESTAMP (ANTI SLEEP)
      # =========================
      - name: Forzar actualización
        run: |
          mkdir -p docs
          date > docs/last_update.txt

      # =========================
      # 8. COMMIT LIMPIO
      # =========================
      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "📂 Estado repo:"
          git status

          # SOLO LO IMPORTANTE
          git add js/script.js docs/ historial_*.png gasolina.db main.py || true

          # evitar commits vacíos
          if git diff --cached --quiet; then
            echo "⚠️ Sin cambios reales → no commit"
            exit 0
          fi

          git commit -m "🚀 Update gasolina + energía $(date '+%Y-%m-%d %H:%M')"
          git push

      # =========================
      # 9. DIAGNÓSTICO FINAL
      # =========================
      - name: Estado final
        run: |
          echo "=================================="
          echo "✅ WORKFLOW FINALIZADO"
          echo "=================================="
          git log -1 --oneline || true