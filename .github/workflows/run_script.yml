name: Actualizar precios gasolina

on:
  schedule:
    - cron: "0 8 * * *"  # Ejecuta todos los días a las 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # Permite hacer push al repositorio

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      # Clonar repositorio
      - name: Clonar repositorio
        uses: actions/checkout@v3

      # Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Ejecutar script principal
      - name: Ejecutar main.py
        run: python main.py

      # Commit automático solo si hay cambios en docs/
      - name: Commit cambios automáticos
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Actualizar precios gasolina y gráficos"
          git push