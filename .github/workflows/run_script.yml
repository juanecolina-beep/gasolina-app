name: Actualizar precios gasolina + energía

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CLONAR REPO
      # =========================
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # =========================
      # 2. PYTHON
      # =========================
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # =========================
      # 3. DEPENDENCIAS
      # =========================
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pandas requests

      # =========================
      # 4. EJECUCIÓN MAIN (FAIL FAST)
      # =========================
      - name: Ejecutar main.py
        run: |
          set -e
          echo "🚀 Ejecutando script..."
          python main.py

      # =========================
      # 5. VALIDACIÓN DE OUTPUTS (CLAVE)
      # =========================
      - name: Validar archivos generados
        run: |
          echo "📂 Verificando outputs..."

          test -f js/script.js || (echo "❌ Falta script.js" && exit 1)
          test -f historial_gasolina.png || echo "⚠️ Falta histórico gasolina"
          test -f historial_energia.png || echo "⚠️ Falta histórico energía"

          echo "✅ Validación completada"

      # =========================
      # 6. FORZAR TIMESTAMP
      # =========================
      - name: Forzar actualización
        run: |
          mkdir -p docs
          date > docs/last_update.txt

      # =========================
      # 7. COMMIT INTELIGENTE (MEJORADO)
      # =========================
      - name: Commit y push cambios
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "📂 Estado del repo:"
          git status

          # SOLO ARCHIVOS REALES DEL SISTEMA
          git add js/script.js docs/ historial_*.png gasolina.db main.py || true

          # Detectar cambios reales
          if git diff --cached --quiet; then
            echo "⚠️ Sin cambios reales → skip commit"
            exit 0
          fi

          git commit -m "🚀 Update gasolina + energía $(date '+%Y-%m-%d %H:%M')"
          git push

      # =========================
      # 8. DEBUG FINAL
      # =========================
      - name: Estado final
        run: |
          echo "=================================="
          echo "✅ WORKFLOW FINALIZADO"
          echo "=================================="
          git log -1 --oneline || true