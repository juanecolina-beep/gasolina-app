name: Actualizar precios gasolina

on:
  schedule:
    - cron: "0 8 * * *"  # Cada día a las 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Configurar variables de entorno
        env:
          API_KEY: ${{ secrets.API_KEY }}  # si tu script necesita un token
        run: echo "Variables configuradas"

      - name: Ejecutar script
        run: python main.py
        env:
          API_KEY: ${{ secrets.API_KEY }}  # exporta al script

      - name: Commit cambios automáticos
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Actualizar datos gasolina"
          git push