<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gasolina + Energía Seseña</title>
</head>
<body>

    <h1>⛽ Gasolina 95 Repsol - Seseña</h1>

    <h2>💰 Gasolinera más barata hoy</h2>
    <p id="barata">Cargando...</p>

    <h2>📊 Gráfico histórico gasolina</h2>
    <img id="img_gasolina" src="historial_gasolina.png" width="700" alt="Gráfico histórico gasolina">

    <h2>📥 Descargar histórico de precios</h2>
    <a id="csvlink" href="precios_gasolina.csv?v=0" download>CSV de precios</a>

    <h2>⚡ Gráfico histórico luz y gas</h2>
    <img id="img_energia" src="historial_energia.png" width="700" alt="Gráfico histórico luz y gas">

    <p>⚡ Luz hoy: <span id="luz">Cargando...</span></p>
    <p>🔥 Gas hoy: <span id="gas">Cargando...</span></p>

    <script>
        // Valores iniciales y refresco por defecto
        const ts = Date.now();
        const csvLink = document.getElementById("csvlink");
        const imgGas = document.getElementById("img_gasolina");
        const imgEner = document.getElementById("img_energia");

        if(csvLink) csvLink.href = "precios_gasolina.csv?v=" + ts;
        if(imgGas) imgGas.src = "historial_gasolina.png?v=" + ts;
        if(imgEner) imgEner.src = "historial_energia.png?v=" + ts;

        // Valores por defecto
        const barataElem = document.getElementById("barata");
        const luzElem = document.getElementById("luz");
        const gasElem = document.getElementById("gas");
        if(barataElem) barataElem.textContent = "Cargando...";
        if(luzElem) luzElem.textContent = "Cargando...";
        if(gasElem) gasElem.textContent = "Cargando...";
    </script>

    <!-- JS generado automáticamente por main.py -->
    <script src="js/script.js"></script>

</body>
</html>
