<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gasolina + Energía Seseña</title>
</head>
<body>

    <h1>⛽ Gasolina 95 Repsol - Seseña</h1>

    <h2>💰 Gasolinera más barata hoy</h2>
    <p id="barata">Cargando...</p>

    <h2>📊 Gráfico histórico gasolina</h2>
    <img id="img_gasolina" src="historial_gasolina.png" width="700" alt="Gráfico histórico gasolina">

    <h2>📥 Descargar histórico de precios</h2>
    <a id="csvlink" href="precios_gasolina.csv?v=0" download>CSV de precios</a>

    <h2>⚡ Gráfico histórico luz y gas</h2>
    <img id="img_energia" src="historial_energia.png" width="700" alt="Gráfico histórico luz y gas">

    <p>⚡ Luz hoy: <span id="luz">Cargando...</span></p>
    <p>🔥 Gas hoy: <span id="gas">Cargando...</span></p>

    <script>
        // Valores por defecto antes de cargar JS dinámico
        const timestamp = Date.now();
        document.getElementById("csvlink").href = "precios_gasolina.csv?v=" + timestamp;
        document.getElementById("img_gasolina").src = "historial_gasolina.png?v=" + timestamp;
        document.getElementById("img_energia").src = "historial_energia.png?v=" + timestamp;

        document.getElementById("barata").textContent = "Cargando...";
        document.getElementById("luz").textContent = "Cargando...";
        document.getElementById("gas").textContent = "Cargando...";
    </script>

    <!-- JS generado automáticamente -->
    <script src="js/script.js"></script>

</body>
</html>
