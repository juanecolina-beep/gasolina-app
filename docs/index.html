<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gasolina + Energía Seseña</title>

    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background: #fafafa;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .top3 {
            background: #eef6ff;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .meta {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        .highlight {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>⛽ Gasolina + ⚡ Energía (Seseña)</h1>

    <!-- INFO SISTEMA -->
    <div class="card">
        <p id="update" class="meta">🕒 Última actualización: cargando...</p>
        <p id="total" class="meta">⛽ Estaciones analizadas: ...</p>
    </div>

    <div class="card">
        <h2>💰 Mejor precio hoy</h2>
        <p id="barata" class="highlight">Cargando...</p>
    </div>

    <div class="card">
        <h2>🏆 Top 3 gasolineras</h2>
        <pre id="top3" class="top3">Cargando...</pre>
    </div>

    <div class="card">
        <h2>⚡ Energía hoy</h2>
        <p>⚡ Luz: <span id="luz">Cargando...</span></p>
        <p>🔥 Gas: <span id="gas">Cargando...</span></p>
    </div>

    <div class="card">
        <h2>📊 Histórico gasolina</h2>
        <img id="img_gasolina" src="historial_gasolina.png" width="100%">
    </div>

    <div class="card">
        <h2>⚡ Histórico energía</h2>
        <img id="img_energia" src="historial_energia.png" width="100%">
    </div>

    <div class="card">
        <h2>📥 Descargar datos</h2>
        <a id="csvlink" href="#">Descargar CSV</a>
    </div>

    <!-- JS dinámico -->
    <script src="js/script.js"></script>

    <!-- FALLBACK SI JS FALLA -->
    <script>
        setTimeout(() => {
            if (document.getElementById('barata').textContent === "Cargando...") {
                document.getElementById('barata').textContent = "⚠️ No se pudieron cargar datos";
            }
        }, 5000);
    </script>

</body>
</html>
