<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gasolina + Energía Seseña</title>

    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .top3 {
            background: #eef6ff;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>⛽ Gasolina + ⚡ Energía (Seseña)</h1>

    <div class="card">
        <h2>💰 Mejor precio hoy</h2>
        <p id="barata">Cargando...</p>
    </div>

    <div class="card">
        <h2>🏆 Top 3 gasolineras</h2>
        <pre id="top3" class="top3">Cargando...</pre>
    </div>

    <div class="card">
        <h2>⚡ Energía hoy</h2>
        <p>⚡ Luz: <span id="luz">Cargando...</span></p>
        <p>🔥 Gas: <span id="gas">Cargando...</span></p>
    </div>

    <div class="card">
        <h2>📊 Histórico gasolina</h2>
        <img id="img_gasolina" src="historial_gasolina.png" width="100%">
    </div>

    <div class="card">
        <h2>⚡ Histórico energía</h2>
        <img id="img_energia" src="historial_energia.png" width="100%">
    </div>

    <div class="card">
        <h2>📥 Descargar datos</h2>
        <a id="csvlink" href="#">Descargar CSV</a>
    </div>

    <!-- JS dinámico -->
    <script src="js/script.js"></script>

</body>
</html>
